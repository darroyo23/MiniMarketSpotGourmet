spring:
  datasource:
    url: jdbc:postgresql://prod-server:5432/minimarket_prod
    username: prod_user
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  rabbitmq:
    host: prod-rabbit
    port: 5672
    username: prod_user
    password: ${RABBIT_PASSWORD}

logging:
  level:
    root: WARN